<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Payel ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">🎉 Happy Birthday My Love Payel 🎉</h1>

    <!-- 🎂 Animated Cake -->
    <div class="cake">
        <div class="candle">
            <div class="flame"></div>
        </div>
        <div class="layer top"></div>
        <div class="layer middle"></div>
        <div class="layer bottom"></div>
    </div>

    <!-- 🎁 Surprise Section -->
    <button class="surprise-btn" onclick="showSurprise()">🎁 Click For Surprise</button>

    <div id="surprise-section" class="hidden">
        <h2>You are the most beautiful part of my life 💖</h2>
        <p>I am so lucky to have you. Today is all about you!</p>
    </div>

    <!-- ❤️ Yes / No Section -->
    <div class="question-section">
        <h2>Will you stay with me forever? ❤️</h2>
        <button class="yes-btn" onclick="sayYes()">Yes 💘</button>
        <button class="no-btn" id="noBtn">No 🙈</button>
    </div>

    <!-- 📸 Photo Popup -->
    <div id="photo-popup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">×</span>
            <img src="we.jpeg" alt="Our Photo">
            <h2>I Love You So Much ❤️</h2>
        </div>
    </div>

    <!-- 🎆 Fireworks Canvas -->
    <canvas id="fireworks"></canvas>

    <!-- 💖 Love Symbol -->
    <div id="love-symbol" class="hidden">💖</div>

<script src="script.js"></script>
</body>
</html>
